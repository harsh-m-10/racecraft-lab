name: Update F1 data

on:
  workflow_dispatch:
  schedule:
    # Every 2 hours Friday–Sunday: quali and race results land the same day.
    - cron: "0 */2 * * 5,6,0"
    # Monday 06:00 UTC sweep — catches late classification changes. No-op when nothing new.
    - cron: "0 6 * * 1"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Restore FastF1 cache
        uses: actions/cache@v4
        with:
          path: data/fastf1_cache
          key: fastf1-cache-${{ github.run_id }}
          restore-keys: |
            fastf1-cache-

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Ingest new sessions
        run: python -m racecraft ingest
        env:
          PYTHONPATH: pipeline

      - name: Validate datasets
        run: python -m racecraft validate
        env:
          PYTHONPATH: pipeline

      - name: Rebuild exports
        run: python -m racecraft export
        env:
          PYTHONPATH: pipeline

      - name: Commit and push updates
        run: |
          git config user.name "racecraft-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/parquet data/exports data/processed
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Data update: $(date -u +%Y-%m-%d)"
            git push
          fi
